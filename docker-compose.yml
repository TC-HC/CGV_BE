services:
  backend:
    build:
      context: .
    command: sh -c "npx prisma generate && npx prisma migrate deploy && npm run start:dev"
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/cgv?schema=public
      CORS_ORIGIN: http://localhost:5173
      SWAGGER_PATH: api
    volumes:
      - .:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: cgv
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cgv"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  backend_node_modules:
  postgres_data:
